name: Deploy Frontend (Web PWA & Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Temporarily disable caches to force clean, uncorrupted npm trees
      - name: Install Dependencies
        run: |
          cd apps/mobile
          npm install --legacy-peer-deps

      - name: Build Web App (PWA)
        run: |
          cd apps/mobile
          npx expo export

      - name: Deploy PWA to Firebase Hosting
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      # Run prebuild with clean flag to delete stale files
      - name: Generate Native Android Directory
        run: |
          cd apps/mobile
          npx expo prebuild --platform android --clean

      # Compile release APK
      - name: Build Android APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease --no-daemon

      # Upload compiled APK
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
