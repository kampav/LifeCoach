name: Deploy Frontend (Web PWA & Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # Caches npm dependencies to speed up the pipeline
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: apps/mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Caches Gradle build configurations to optimize compilation runs
      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: |
          cd apps/mobile
          npm install --legacy-peer-deps

      - name: Build Web App (PWA)
        run: |
          cd apps/mobile
          npx expo export

      - name: Deploy PWA to Firebase Hosting
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      # Generates native /android project structures on-the-fly inside the runner
      - name: Generate Native Android Directory
        run: |
          cd apps/mobile
          npx expo prebuild --platform android

      # Compiles release APK directly on the GitHub Runner (zero queue delays)
      - name: Build Android APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease --no-daemon

      # Uploads compiled APK as a direct download link on your Actions run page
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
