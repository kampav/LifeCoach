name: Deploy Frontend (Web PWA & Android APK)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Using Node 20 (LTS) to guarantee compatibility with Expo bundlers
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: apps/mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
          cd apps/mobile
          npm install --legacy-peer-deps

      - name: Build Web App (PWA)
        run: |
          cd apps/mobile
          npx expo export

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Android APK Preview Build
        run: |
          cd apps/mobile
          npx eas-cli build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
